pre-commit:
  parallel: false
  commands:
    format:
      run: bun run format
      stage_fixed: true
    lint:
      run: bun run lint
    typecheck:
      run: bun run typecheck

pre-push:
  parallel: false
  commands:
    typecheck:
      files: git ls-files -- lefthook.yml
      run: 'test -n "{files}" && bun run typecheck'
    test:
      files: git ls-files -- lefthook.yml
      # env -u: git exports GIT_DIR & co to hook processes; unguarded test
      # fixtures inherit them and run git against the real repo instead of
      # their temp dirs.
      run: 'test -n "{files}" && env -u GIT_DIR -u GIT_WORK_TREE -u GIT_INDEX_FILE -u GIT_COMMON_DIR bun run test'
